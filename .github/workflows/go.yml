name: Go Linux Build

on:
  push:
    branches: ["suluck/username-ip-allocation"]
  pull_request:
    branches: ["suluck/username-ip-allocation"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            artifact_name: headscale-linux-amd64
          - goarch: arm64
            artifact_name: headscale-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Build Linux binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: go build -o headscale ./cmd/headscale

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: headscale
